<!DOCTYPE html>
<html>
<head>
    <title>Daniel's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Global Reset (CRUCIAL) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
        }

        /* 2. Navbar Styling */
        .navbar {
            background-color: #333; /* Dark Bar */
            color: white;
            display: flex;
            justify-content: space-between; /* Spacing */
            align-items: center; /* Vertical Center */
            padding: 15px 30px;
        }

        .name {
            font-family: 'Bangers', system-ui;
            letter-spacing: 2px;
            font-size: 24px;
        }

        /* Styling the list of links */
        .nav-links {
            list-style: none; /* Remove bullet points */
            display: flex;    /* Make list items sit side-by-side */
            gap: 20px;        /* Space between links */
        }

        .nav-links li {
            cursor: pointer; /* Makes mouse look like a hand */
        }

        .nav-links li:hover {
            color: #ff4757; /* Change color when hovering */
        }

        /* 3. Hero Section */
        .hero {
            text-align: center; /* Center text */
            padding: 80px 20px;
            background-color: white;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 4. Projects Grid */
        .work-section {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto; /* Center the whole block */
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 Columns */
            gap: 20px;
        }

        /* Placeholder Card Style */
        .card {
            background-color: white;
            padding: 40px;
            border: 1px solid #ddd;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            font-weight: bold;
        }

        /* 5. Mobile Responsiveness */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column; /* Stack logo and links */
                gap: 15px;
            }
            
            .project-grid {
                grid-template-columns: 1fr; /* Switch to 1 Column */
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="name">DANIEL</div>
        <ul class="nav-links">
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Hi, I'm Daniel</h1>
        <p>A Web Developer based in Lagos, Nigeria.</p>
    </div>

    <div class="work-section">
        <h2 class="section-title">My Recent Work</h2>
        
        <div class="project-grid">
            <div class="card">Project 1 (Luffy Page)</div>
            <div class="card">Project 2 (Zoro Poster)</div>
            <div class="card">Project 3 (Portfolio)</div>
        </div>
        <h3>My Skills</h3>
        <ul id="skills-list">
        </ul>
    </div>
<script src="script.js"></script>
</body>
</html>
